<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="todo.css">
  <link rel="stylesheet" href="todolarge.css">
  
   <script type="" src="jquery.min.js"></script>
   <script type="" src="todo.js"></script>
  
  <title>Frontend Mentor | Todo app</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution {
      font-size: 11px;
      text-align: center;
      color:black;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>
</head>

<body>
  <div id="container">
    <header>

      <picture>
        <source media="(min-width: 1200px)" srcset="images/bg-desktop-light.jpg">

        <img class="headImage" id="headImagelight" src="images/bg-mobile-light.jpg" alt="">
      </picture>

      <picture>
        <source media="(min-width: 1200px)" srcset="images/bg-desktop-dark.jpg">
        <img class="headImage" id="headImagedark" src="images/bg-mobile-dark.jpg" alt="">
      </picture>

      <div id="headerContent">

        <span>TODO</span>
        <span>
          <span id="iconMoon">
            <img src="images/icon-moon.svg" alt="">
          </span>
          <span id="iconSun">
            <img src="images/icon-sun.svg" alt="">
          </span>
        </span>

      </div>

    </header>

    <div id="content">

      <div id="add">
        <span id="submit"><span></span></span>
        <input type="text" id="addNew" placeholder="Create new todo...">
      </div>

      <div id="list">
        <ul id="toDo">

        </ul>
        <div id="listTools">
          <span>
            <span id="itemsLeft">
              0
            </span><!-- Add dynamic number -->
            items left
          </span>

          <div id="largeFilters">

            <input type="radio" name="filter" id="i1" checked>
            <input type="radio" name="filter" id="i2">
            <input type="radio" name="filter" id="i3">
    
            <label for="i1" class="all">All</label>
            <label for="i2" class="active">Active </label>
            <label for="i3" class="completed">Completed</label>
          </div>

          <span id="clear">
            Clear Completed
          </span>
        </div>
      </div>


      <div id="filters">

        <input type="radio" name="filter" id="r1" checked>
        <input type="radio" name="filter" id="r2">
        <input type="radio" name="filter" id="r3">

        <label for="r1" class="all">All</label>
        <label for="r2" class="active">Active </label>
        <label for="r3" class="completed">Completed</label>
      </div>



      <div id="dragDrop">
        <span>
          Drag and drop to reorder list
        </span>
      </div>

    </div>
    <!--#content end-->

  </div>
  <!--#container end-->

  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
    Coded by <a href="www.github.com/5erious5am">Samuel Akinode</a>.
  </div>
   
</body>

</html>
